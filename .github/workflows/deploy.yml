name: 至尊斗牛自动部署

on:
  push:
    branches: [ main ] # 确保这是你推送的分支名

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Node.js 20
        uses: actions/setup-node@v3
        with:
          # 【重要修改】：Vite 6 和 Tailwind 必须要求 Node 20，Node 18 会报错 CustomEvent is not defined
          node-version: '20'

      - name: 部署到日本服务器
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     # 你的 IP: 45.32.248.214
          username: ${{ secrets.SERVER_USER }} # 通常是 root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 确保服务器环境有正确的 Node.js v20
            if [[ $(node -v) != v20* ]]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # 2. 进入项目目录（适配您服务器上的真实目录 /var/www/zhizundouniu）
            DEPLOY_DIR="/var/www/zhizundouniu"
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              sudo mkdir -p $DEPLOY_DIR
              sudo chown -R $USER:$USER $DEPLOY_DIR
              git clone https://github.com/AthenDrakomin-hub/zhizundouniu.git $DEPLOY_DIR
            fi
            cd $DEPLOY_DIR
            # 使用 reset --hard 和 fetch 来防止本地修改导致 git pull 冲突
            git fetch origin main
            git reset --hard origin/main

            # 3. 安装依赖并构建
            # 【重要保留】：保留了解决 npm Tailwind Bug 的清除指令和 --legacy-peer-deps
            # 【重要新增】：强制 sqlite3 在本地服务器根据当前 GLIBC 重新编译，避免跨环境绑定库错误
            rm -rf node_modules package-lock.json @tailwindcss
            npm install --legacy-peer-deps
            npm rebuild sqlite3 --build-from-source
            
            # 【重要新增】：编译服务端 TypeScript 为纯 JavaScript (dist-server/server.js)，提升高并发稳定性
            npm run build:server
            
            cd admin-client && rm -rf node_modules package-lock.json && npm install --legacy-peer-deps && cd ..
            
            npm run build
            cd admin-client && npm run build && cd ..
            
            # 4. 确保安装了 PM2
            sudo npm install pm2 -g

            # 5. 重启项目 (使用 --update-env 刷新环境变量)
            # 【重要修改】：使用原生的 Node 运行预编译好的 dist-server/server.js，彻底告别 tsx
            pm2 delete all || true
            pm2 start dist-server/server.js --name "zhizundouniu" --update-env
            pm2 save
            
            # 6. 重启 Nginx 确保通道顺畅
            sudo systemctl restart nginx