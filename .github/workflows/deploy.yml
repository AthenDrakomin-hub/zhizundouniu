name: 至尊斗牛自动部署

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 安装 Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: 部署到日本服务器
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. 环境强制检查
            if [[ $(node -v) != v20* ]]; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # 2. 目录与代码同步
            DEPLOY_DIR="/var/www/zhizundouniu"
            sudo mkdir -p $DEPLOY_DIR
            sudo chown -R $USER:$USER $DEPLOY_DIR
            
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              git clone https://github.com/AthenDrakomin-hub/zhizundouniu.git $DEPLOY_DIR
            fi
            
            cd $DEPLOY_DIR
            git fetch origin main
            git reset --hard origin/main

            # 3. 依赖安装与【关键重编】
            # 清理旧依赖，确保环境纯净
            rm -rf node_modules package-lock.json
            
            # 安装依赖（使用 --legacy-peer-deps 解决组件冲突）
            npm install --legacy-peer-deps
            
            # 【核心修复】：在服务器本地重新编译 sqlite3，彻底解决 GLIBC 版本不匹配导致的 502
            # 增加 --unsafe-perm 防止权限报错
            npm rebuild sqlite3 --build-from-source --unsafe-perm
            
            # 后端编译：将 server.ts 编译为 dist-server/server.js
            npm run build:server
            
            # 管理端构建
            cd admin-client
            rm -rf node_modules package-lock.json
            npm install --legacy-peer-deps
            npm run build
            cd ..
            
            # 游戏前端构建
            npm run build
            
            # 4. 守护进程安装
            sudo npm install pm2 -g

            # 5. 【核心启动优化】：使用原生 Node 运行编译后的 js，告别 tsx 报错
            # 先停止所有，确保端口 3000 被释放
            pm2 delete all || true
            
            # 使用原生 node 运行编译产物，这是生产环境最稳健的方式
            pm2 start dist-server/server.js --name "zhizundouniu" --update-env
            pm2 save
            
            # 6. 通道刷新
            sudo systemctl restart nginx