name: Deploy to Japan Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        cd admin-client && rm -rf node_modules package-lock.json && npm install --legacy-peer-deps

    - name: Build Projects
      run: |
        npm run build
        cd admin-client && npm run build

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || '22' }}
        script: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          
          # If node/npm/pm2 are not installed, install them (assuming Ubuntu/Debian)
          if ! command -v node &> /dev/null; then
            curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 18
            nvm use 18
            nvm alias default 18
          fi
          
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2 ts-node typescript
          fi

          DEPLOY_DIR="/var/www/zhizundouniu"
          
          # Ensure directory exists and clone/pull
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            sudo mkdir -p $DEPLOY_DIR
            sudo chown -R $USER:$USER $DEPLOY_DIR
            git clone https://github.com/AthenDrakomin-hub/zhizundouniu.git $DEPLOY_DIR
            cd $DEPLOY_DIR
          else
            cd $DEPLOY_DIR
            git pull origin main
          fi
          
          # Install dependencies
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          cd admin-client && rm -rf node_modules package-lock.json && npm install --legacy-peer-deps && cd ..
          
          # Build
          npm run build
          cd admin-client && npm run build && cd ..
          
          # Restart the service
          pm2 restart zhizundouniu || pm2 start ts-node --name "zhizundouniu" -- server.ts
          pm2 save
